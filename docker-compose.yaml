services:
  knowpals-go:
    build: ./knowpals-go
    container_name: knowpals-go
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - kafka
    volumes:
      - /root/knowpals/config/go-config.yaml:/root/go-config.yaml
      - /root/knowpals/logs:/logs
    environment:
      - CONFIG_PATH=/root/go-config.yaml

  knowpals-python:
    build: ./knowpals-python
    container_name: knowpals-python
    ports:
      - "5000:5000"
    depends_on:
      - kafka
      - redis
    volumes:
      - /root/knowpals/config/python-config.yaml:/root/python-config.yaml
    environment:
      - CONFIG_PATH=/root/python-config.yaml

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass 12345678
    restart: always
    volumes:
      - redis-data:/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1

      # KRaft模式
      KAFKA_PROCESS_ROLES: broker,controller

      # controller配置
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://101.35.247.221:9092

      # listener mapping
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # 单节点必须
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # KRaft存储ID（必须）
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

    volumes:
      - kafka-data:/var/lib/kafka/data

volumes:
  mysql-data:
  redis-data:
  kafka-data: