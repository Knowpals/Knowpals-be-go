syntax = "proto3";

package agent;

// 生成到：api/grpc/agentpb
option go_package = "github.com/Knowpals/Knowpals-be-go/api/grpc/agentpb;agentpb";

message ChatRequest {
  string student_id = 1;
  string text = 2;
  string video_id = 3;      // optional
  string knowledge_id = 4;  // optional
}

message ChatResponse {
  string reply = 1;
  string context = 2;
  string video_id = 3;
}

message GenerateQuizRequest {
  string student_id = 1;
  string video_id = 2;
  int32 num_questions = 3;
}

message QuizItem {
  string knowledge_id = 1;
  string type = 2; // choice|fill|judge
  string question = 3;
  repeated string options = 4;
  string answer = 5;
  string analysis = 6;
  string difficulty = 7; // easy|medium|hard
}

message GenerateQuizResponse {
  repeated QuizItem quizzes = 1;
}

message GenerateReportRequest {
  string student_id = 1;
  string video_id = 2;
}

message ReportItem {
  string knowledge_id = 1;
  double mastery = 2;
  string summary = 3;
  repeated string weakness = 4;
  repeated string behavior_pattern = 5;
  string trend = 6;
  repeated SegmentRef recommended_segments = 7; // jumpable refs
}

message SegmentRef {
  string video_id = 1;
  string segment_id = 2;
  int64 start_ms = 3;
  int64 end_ms = 4;
}

message GenerateReportResponse {
  string video_id = 1;
  repeated ReportItem items = 2;
  string overall_summary = 3;
}

service AgentService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc GenerateQuiz(GenerateQuizRequest) returns (GenerateQuizResponse);
  rpc GenerateReport(GenerateReportRequest) returns (GenerateReportResponse);
}

