        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/http.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/http.Response'
      summary: 获取班级整体学情统计
      tags:
      - statistic
  /api/v1/stat/student/{video_id}:
    get:
      description: 获取学生单个视频的答题正确率、观看时长、暂停次数、薄弱知识点
      parameters:
      - default: Bearer
        description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 视频ID
        in: path
        name: video_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/http.Response'
            - properties:
                data:
                  $ref: '#/definitions/statistic.GetStudentStatResp'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/http.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/http.Response'
      summary: 获取学生个人学情统计
      tags:
      - statistic
  /api/v1/user/getUser/{id}:
    get:
      consumes:
      - application/json
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      security:
      - ApiKeyAuth: []
      summary: 根据id查询用户
      tags:
      - user
  /api/v1/user/loginByCode:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登陆参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.LoginByVerifyCode'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/http.Response'
            - properties:
                data:
                  $ref: '#/definitions/user.LoginResp'
              type: object
      summary: 用户验证码登录
      tags:
      - user
  /api/v1/user/loginByPassword:
    post:
      consumes:
